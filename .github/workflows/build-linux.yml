name: Build Linux Installer

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y dpkg fakeroot rpm gcc g++ make

      - name: Install NPM Dependencies
        run: npm ci

      - name: Build and Publish Application
        run: npm run build && npx electron-builder --linux --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@vmain
        with:
          name: praise-deck-linux-installer
          path: dist/*.deb